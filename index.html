<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Game Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="quantumCanvas"></canvas>

<h1 class="title">⚛ Quantum Game Hub</h1>

<div id="home" class="grid">

<div class="card" onclick="openGame('superposition')">⚡ Superposition</div>
<div class="card" onclick="openGame('entanglement')">🔗 Entanglement</div>
<div class="card" onclick="openGame('quantum_maze')">🧭 Quantum Maze</div>
<div class="card" onclick="openGame('roulette')">🎲 Roulette</div>
<div class="card" onclick="openGame('dice')">🎰 Dice</div>

</div>

<div id="gameContainer" class="hidden">
<button class="exit" onclick="exitGame()">⟵ Exit</button>
<iframe id="gameFrame"></iframe>
</div>

<script src="script.js"></script>

</body>
</html>
