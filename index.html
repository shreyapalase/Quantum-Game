<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quantum Arcade</title>

<link rel="stylesheet" href="assets/css/home.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">⚛ Quantum Arcade</div>

    <div class="menu">

        <button onclick="showSection('home')">Home</button>
        <button onclick="showSection('games')">Games</button>
        <button onclick="showSection('about')">About</button>

    </div>

</nav>

<!-- HOME -->
<section id="home" class="page">

    <h1>Quantum Arcade</h1>
    <p>30 Interactive Quantum Games</p>

</section>

<!-- GAMES -->
<section id="games" class="page hidden">

    <h1>Games Library</h1>

    <div class="card" onclick="showSection('coinGame')">
        01. Quantum Coin Flip
    </div>

    <div class="card">02. Quantum Dice</div>
    <div class="card">03. Qubit Explorer</div>

    <button onclick="showSection('home')">Back Home</button>

</section>

<!-- ABOUT -->
<section id="about" class="page hidden">

    <h1>About Quantum Arcade</h1>

    <p>30 quantum games learning platform.</p>

    <button onclick="showSection('home')">Back Home</button>

</section>

<!-- GAME -->
<section id="coinGame" class="page hidden">

    <h1>Quantum Coin Flip</h1>

    <h2 id="result">Click Run</h2>

    <button onclick="runQuantumCoin()">Run Quantum Coin</button>

    <button onclick="showSection('games')">Back to Games</button>

</section>

<!-- JS -->
<script src="assets/js/main.js"></script>

</body>
</html>
