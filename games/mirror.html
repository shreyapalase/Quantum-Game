<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Quantum Mirror Universe</title>

<style>
body {
  margin:0;
  background:black;
  color:#00f7ff;
  font-family:monospace;
  overflow:hidden;
}

/* BACKGROUND SPLIT ENERGY FIELD */
#bg {
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 25% 50%, #00f7ff22 2px, transparent 3px),
    radial-gradient(circle at 75% 50%, #ff00ff22 2px, transparent 3px);
  background-size:60px 60px;
  animation: drift 12s linear infinite;
  z-index:-1;
}

@keyframes drift {
  from {transform:translateY(0);}
  to {transform:translateY(-120px);}
}

/* LAYOUT */
.container { display:flex; }

.universe {
  width:50%;
  text-align:center;
  padding:10px;
  border-right:1px solid #00f7ff33;
}

.universe.right {
  border-right:none;
  border-left:1px solid #ff00ff33;
}

/* CORE ORB */
.orb {
  width:150px;
  height:150px;
  border-radius:50%;
  margin:auto;
  border:2px solid #00f7ff;
  box-shadow:0 0 25px #00f7ff55;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  transition:0.3s;
}

.right .orb {
  border-color:#ff00ff;
  box-shadow:0 0 25px #ff00ff55;
}

/* BUTTON */
button {
  padding:10px;
  background:#00f7ff;
  border:none;
  cursor:pointer;
  margin:5px;
}

.right button {
  background:#ff00ff;
}

/* BARS */
.bar {
  width:60%;
  height:20px;
  border:1px solid #00f7ff;
  margin:auto;
}

.right .bar {
  border-color:#ff00ff;
}

.fill {
  height:100%;
  width:50%;
  background:#00f7ff;
  transition:0.3s;
}

.right .fill {
  background:#ff00ff;
}

/* RESULT */
#result {
  font-size:18px;
}
</style>
</head>

<body>

<div id="bg"></div>

<h1 style="text-align:center;">🪞⚛️ Quantum Mirror Universe</h1>

<div class="container">

<!-- UNIVERSE A -->
<div class="universe">

<h2>Universe A</h2>

<div class="orb" id="orbA">A</div>

<br>

<button onclick="actA()">ACTION A</button>

<div class="bar">
  <div class="fill" id="barA"></div>
</div>

<h3 id="scoreA">0</h3>

</div>

<!-- UNIVERSE B -->
<div class="universe right">

<h2>Universe B</h2>

<div class="orb" id="orbB">B</div>

<br>

<button onclick="actB()">ACTION B</button>

<div class="bar">
  <div class="fill" id="barB"></div>
</div>

<h3 id="scoreB">0</h3>

</div>

</div>

<h3 style="text-align:center;" id="result">Stable Dual Universe</h3>

<script>

let A=0;
let B=0;
let entangle=50;

/* MIRROR ACTION A → B */
function actA(){

  let r=Math.random();

  if(r<0.6){
    A+=2;
    B-=1;
  } else {
    A-=1;
    B+=1;
  }

  update();
}

/* MIRROR ACTION B → A */
function actB(){

  let r=Math.random();

  if(r<0.6){
    B+=2;
    A-=1;
  } else {
    B-=1;
    A+=1;
  }

  update();
}

/* UPDATE SYSTEM */
function update(){

  document.getElementById("scoreA").innerText=A;
  document.getElementById("scoreB").innerText=B;

  document.getElementById("barA").style.width=
    Math.min(100,Math.abs(A))+"%";

  document.getElementById("barB").style.width=
    Math.min(100,Math.abs(B))+"%";

  // entanglement drift
  entangle -= Math.abs(A-B)*0.1;

  if(entangle<0) entangle=0;

  if(entangle<20){
    document.getElementById("result").innerText=
      "⚠ UNIVERSAL DECOHERENCE RISK";
  }

  if(A>20 && B>20){
    document.getElementById("result").innerText=
      "⚛ SYMMETRIC QUANTUM BALANCE ACHIEVED";
  }
}

</script>

</body>
</html>
