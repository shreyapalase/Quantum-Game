<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Bloch Sphere 3D Game</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<header>
  <h1>⚛️ Quantum Bloch Sphere Simulator</h1>
  <p>Learn |0⟩ and |1⟩ states through vector control</p>
</header>

<div class="layout">

  <div class="panel">

    <h2>🎮 Quantum Control</h2>

    <label>Theta (θ)</label>
    <input type="range" id="theta" min="0" max="3.14" step="0.01">

    <label>Phi (φ)</label>
    <input type="range" id="phi" min="0" max="6.28" step="0.01">

    <button onclick="reset()">🔄 Reset State</button>

    <div id="infoBox">Adjust angles to move qubit</div>

    <div id="result"></div>

  </div>

  <div class="scene">
    <canvas id="c"></canvas>
    <div class="labels">
      <div class="l1">|0⟩</div>
      <div class="l2">|1⟩</div>
      <div class="lx">X</div>
      <div class="ly">Y</div>
      <div class="lz">Z</div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
