<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Bloch Sphere</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<header>
  <h1>⚛️ Bloch Sphere Quantum State Simulator</h1>
  <p>Correct 3D Bloch Sphere Representation (Quantum Physics Model)</p>
</header>

<div class="layout">

  <div class="panel">

    <h2>🎮 Controls</h2>

    <label>Theta (θ)</label>
    <input type="range" id="theta" min="0" max="3.1415" step="0.01">

    <label>Phi (φ)</label>
    <input type="range" id="phi" min="0" max="6.283" step="0.01">

    <button onclick="reset()">Reset State</button>

    <div id="info">Move sliders to rotate quantum state</div>

  </div>

  <div class="scene">
    <canvas id="c"></canvas>

    <div class="label top">|0⟩</div>
    <div class="label bottom">|1⟩</div>
    <div class="label x">X</div>
    <div class="label y">Y</div>
    <div class="label z">Z</div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
