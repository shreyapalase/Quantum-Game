<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Quantum Teleportation Simulator AAA</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="galaxy"></canvas>
<div class="overlay"></div>

<header>
<h1>⚛ QUANTUM TELEPORTATION SIMULATOR</h1>
<p>AAA Quantum Animation Engine</p>
</header>

<div class="hud">
<div>
Mission Progress
<div class="progressBar">
<div id="progressFill"></div>
</div>
</div>
<div id="score">Score: 0</div>
</div>

<div class="mainGrid">

<div class="universe">
<h2>🌌 Universe A</h2>
<div id="sourceQubit" class="qubit">?</div>
<button id="generateBtn">Generate State</button>
</div>

<div class="centerArea">

<div class="wormhole">
<div class="ring r1"></div>
<div class="ring r2"></div>
<div class="ring r3"></div>
<div class="ring r4"></div>
</div>

<div id="beam"></div>

<button id="nextStep">START MISSION</button>
</div>

<div class="universe">
<h2>🌌 Universe B</h2>
<div id="targetQubit" class="qubit">?</div>
</div>

</div>

<div class="missionPanel">
<h2>🤖 Mission Commander</h2>
<p id="commander">Generate a quantum state.</p>
</div>

<div class="phasePanel">
<div class="phase" id="p0">Prepare State</div>
<div class="phase" id="p1">Entanglement</div>
<div class="phase" id="p2">Bell Measurement</div>
<div class="phase" id="p3">Classical Transfer</div>
<div class="phase" id="p4">Reconstruction</div>
</div>

<div id="popup" class="popup hidden">
<div class="popupBox">
<h1 id="popupTitle"></h1>
<p id="popupText"></p>
<button onclick="restartMission()">Restart Mission</button>
</div>
</div>

<script src="script.js"></script>

</body>
</html>
