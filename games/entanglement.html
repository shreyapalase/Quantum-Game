<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Entanglement Control Game</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00f7ff;
  font-family: monospace;
  text-align: center;
}

/* FIELD */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #00f7ff22 2px, transparent 3px);
  background-size: 50px 50px;
  animation: drift 6s linear infinite;
  z-index: -1;
}

@keyframes drift {
  from { transform: translateY(0); }
  to { transform: translateY(-100px); }
}

/* MAIN */
.card {
  width: 80%;
  margin: auto;
  margin-top: 20px;
  border: 2px solid #00f7ff;
  padding: 20px;
}

/* SLIDERS */
input {
  width: 60%;
}

/* QUANTUM CORE */
.core {
  width: 150px;
  height: 150px;
  border-radius: 50%;
  border: 2px solid #00f7ff;
  margin: auto;
  position: relative;
  box-shadow: 0 0 20px #00f7ff33;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow: 0 0 5px #00f7ff33; }
  50% { box-shadow: 0 0 30px #00f7ff99; }
  100% { box-shadow: 0 0 5px #00f7ff33; }
}

/* LINK */
.link {
  position: absolute;
  width: 100%;
  height: 2px;
  background: linear-gradient(90deg, #00f7ff, #ff00ff);
  top: 50%;
}

/* STATUS */
#status {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="bg"></div>

<h1>⚛️ Entanglement Control Game</h1>

<div class="card">

<div class="core">
  <div class="link"></div>
</div>

<h3>Quantum Stability Controls</h3>

<p>🔥 Noise (Decoherence)</p>
<input type="range" min="0" max="100" value="10" id="noise">

<p>⚡ Entanglement Strength</p>
<input type="range" min="0" max="100" value="90" id="strength">

<p>🌊 Phase Disturbance</p>
<input type="range" min="0" max="100" value="20" id="phase">

<h2 id="status">STABLE ⚛️</h2>
<h3>Time Stable: <span id="time">0</span>s</h3>

</div>

<script>

let stability = 100;
let time = 0;
let alive = true;

function updateSystem(){

  let noise = +document.getElementById("noise").value;
  let strength = +document.getElementById("strength").value;
  let phase = +document.getElementById("phase").value;

  // quantum stability formula (simulated)
  stability = strength - (noise * 0.6) - (phase * 0.3);

  if(stability < 20){
    document.getElementById("status").innerText = "DECOHERENCE 💥 LOST";
    alive = false;
  } else {
    document.getElementById("status").innerText = "STABLE ⚛️";
  }

}

setInterval(()=>{

  if(!alive) return;

  updateSystem();

  time++;
  document.getElementById("time").innerText = time;

  if(time > 10 && stability > 30){
    document.getElementById("status").innerText = "YOU WIN 🎉 STABLE ENTANGLEMENT";
    alive = false;
  }

}, 1000);

</script>

</body>
</html>
