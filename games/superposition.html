<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coin Toss Lab</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🪙 COIN TOSS LAB</h1>
<p id="mission">MISSION: Get HEADS 3 times in a row</p>

<div class="coin" id="coin">H</div>

<div class="controls">
  <button onclick="toss()">TOSS COIN</button>
  <button onclick="reset()">RESET</button>
</div>

<div class="stats">
  <p>Heads: <span id="h">0</span></p>
  <p>Tails: <span id="t">0</span></p>
  <p>Streak: <span id="streak">0</span></p>
</div>

<h2 id="result"></h2>

<div id="overlay">
  <div class="box">
    <h1 id="final"></h1>
    <button onclick="reset()">PLAY AGAIN</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
