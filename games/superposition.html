<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Superposition Level 2</title>

<style>
body {
  margin: 0;
  background: black;
  color: #00f7ff;
  font-family: monospace;
  text-align: center;
  overflow: hidden;
}

/* MAIN CONTAINER */
.card {
  width: 90%;
  margin: auto;
  margin-top: 20px;
  border: 2px solid #00f7ff;
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 0 30px #00f7ff33;
}

/* BLOCH SPHERE */
.sphere {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  border: 2px solid #00f7ff;
  margin: 20px auto;
  position: relative;
  cursor: grab;
}

.pointer {
  width: 14px;
  height: 14px;
  background: #ff00ff;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform-origin: 0px 0px;
}

/* PROBABILITY BAR */
.bar {
  width: 80%;
  height: 22px;
  border: 1px solid white;
  margin: 10px auto;
  display: flex;
}

.p0 {
  background: #00f7ff;
  width: 50%;
  transition: 0.2s;
}

.p1 {
  background: #ff00ff;
  width: 50%;
  transition: 0.2s;
}

/* BUTTONS */
button {
  padding: 10px 15px;
  margin: 8px;
  border: none;
  background: #00f7ff;
  cursor: pointer;
}

/* SCORE */
#score {
  font-size: 18px;
  margin-top: 10px;
}

/* WAVE BACKGROUND */
#wave {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #00f7ff22 1px, transparent 1px);
  background-size: 40px 40px;
  animation: move 6s linear infinite;
  z-index: -1;
}

@keyframes move {
  from { transform: translateY(0); }
  to { transform: translateY(-100px); }
}
</style>
</head>

<body>

<div id="wave"></div>

<h1>⚛️ Superposition Level 2</h1>

<div class="card">

  <h3>Drag Sphere → Change Quantum State</h3>

  <!-- BLOCH SPHERE -->
  <div class="sphere" id="sphere">
    <div class="pointer" id="pointer"></div>
  </div>

  <!-- PROBABILITY -->
  <div class="bar">
    <div id="p0" class="p0"></div>
    <div id="p1" class="p1"></div>
  </div>

  <p>|0⟩: <span id="prob0">50</span>% | |1⟩: <span id="prob1">50</span>%</p>

  <button onclick="measure()">Measure</button>

  <h2 id="result"></h2>
  <div id="score">Score: 0</div>

</div>

<script>
let angle = 0;
let score = 0;

/* MOUSE CONTROL BLOCH SPHERE */
let dragging = false;

const sphere = document.getElementById("sphere");

sphere.addEventListener("mousedown", () => dragging = true);
document.addEventListener("mouseup", () => dragging = false);

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  angle = e.clientX / window.innerWidth * Math.PI * 2;
  updateQuantum();
});

/* QUANTUM STATE CALCULATION */
function updateQuantum() {
  // simulate quantum amplitudes using sine/cosine
  let p1 = Math.pow(Math.sin(angle), 2);
  let p0 = 1 - p1;

  let percent0 = Math.round(p0 * 100);
  let percent1 = Math.round(p1 * 100);

  document.getElementById("p0").style.width = percent0 + "%";
  document.getElementById("p1").style.width = percent1 + "%";

  document.getElementById("prob0").innerText = percent0;
  document.getElementById("prob1").innerText = percent1;

  // move pointer visually
  document.getElementById("pointer").style.transform =
    `translate(${80 + Math.sin(angle)*60}px, ${80 + Math.cos(angle)*60}px)`;
}

/* MEASUREMENT */
function measure() {
  let p1 = Math.pow(Math.sin(angle), 2);

  let roll = Math.random();

  if (roll < p1) {
    document.getElementById("result").innerText = "WIN 🎉 |1⟩";
    score++;
  } else {
    document.getElementById("result").innerText = "LOSE 💀 |0⟩";
    score = Math.max(0, score - 1);
  }

  document.getElementById("score").innerText = "Score: " + score;
}

/* AUTO UPDATE (quantum wave feel) */
setInterval(updateQuantum, 50);

updateQuantum();
</script>

</body>
</html>
