<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Roulette FIX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>

<div class="ui">

  <div class="panel">
    <h1 class="title">QUANTUM ROULETTE</h1>
    <div class="box">Press spin to start simulation</div>
  </div>

  <div class="game">

    <div id="hud">
      Prob: <span id="prob">100</span> |
      Spins: <span id="spins">0</span>
    </div>

    <div id="wheel"></div>

    <!-- IMPORTANT: button directly calls safe function -->
    <button onclick="spin()">SPIN</button>

    <canvas id="hist"></canvas>

  </div>

</div>

<div id="popup">
  <div class="popupBox">
    <h1 id="resultText"></h1>
    <button onclick="resetGame()">RESTART</button>
  </div>
</div>

<!-- 🔥 FIX: defer ensures JS loads AFTER HTML -->
<script src="game.js" defer></script>

</body>
</html>
