<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Roulette SAFE FIX</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
}

#wheel {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: conic-gradient(red, black, cyan, black, yellow);
  margin: 20px;
  transition: transform 1.5s ease;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}

#popup {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<h2>Quantum Roulette (SAFE MODE)</h2>

<div id="wheel"></div>

<button id="spinBtn">SPIN</button>

<p>Probability: <span id="prob">100</span></p>
<p>Spins: <span id="spins">0</span></p>

<div id="popup">
  <div style="background:#111;padding:20px;border:1px solid cyan;">
    <h1 id="result"></h1>
    <button onclick="resetGame()">RESTART</button>
  </div>
</div>

<script>
/* =========================
   SAFE GLOBAL GAME ENGINE
   ========================= */

let probability = 100;
let spins = 0;

const wheel = document.getElementById("wheel");
const probText = document.getElementById("prob");
const spinText = document.getElementById("spins");
const popup = document.getElementById("popup");
const result = document.getElementById("result");

/* ✅ BUTTON IS GUARANTEED WORKING HERE */
document.getElementById("spinBtn").addEventListener("click", spin);

function spin() {

  spins++;

  // wheel animation
  let angle = 720 + Math.random() * 360;
  wheel.style.transform = `rotate(${angle}deg)`;

  // probability logic
  let roll = Math.random();

  if (roll > 0.7) {
    probability += 10;
  } else {
    probability -= 12;
  }

  // clamp (VERY IMPORTANT)
  probability = Math.max(0, Math.min(100, probability));

  // UI update
  probText.innerText = probability;
  spinText.innerText = spins;

  // finish game
  if (spins >= 10) {
    setTimeout(() => {
      popup.style.display = "flex";

      result.innerText =
        probability > 60 ? "YOU WIN ⚛" : "YOU LOSE 💥";

    }, 600);
  }
}

function resetGame() {
  probability = 100;
  spins = 0;
  popup.style.display = "none";
  wheel.style.transform = "rotate(0deg)";
  probText.innerText = probability;
  spinText.innerText = spins;
}
</script>

</body>
</html>
