<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quantum Uncertainty War AAA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">

  <div class="panel left">
    <h1>⚛ QUANTUM UNCERTAINTY WAR</h1>

    <div class="card">
      <h3>MISSION</h3>
      <p>Control probability space before AI collapses reality.</p>
    </div>

    <div class="card">
      <h3>RULE</h3>
      <p>Quantum gates modify statevector amplitudes.</p>
    </div>

    <div class="card">
      <h3>WIN</h3>
      <p>Higher probability at measurement wins.</p>
    </div>

    <button onclick="startBattle()">START</button>
  </div>

  <div class="panel center">
    <h2>QUANTUM CIRCUIT</h2>

    <button onclick="applyGate('H')">H</button>
    <button onclick="applyGate('X')">X</button>
    <button onclick="applyGate('CX')">CX</button>
    <button onclick="measure()">MEASURE</button>

    <div id="log" class="log"></div>

    <canvas id="chart"></canvas>
  </div>

  <div class="panel right">
    <h2>STATE</h2>

    <div>PLAYER: <span id="p"></span></div>
    <div>AI: <span id="a"></span></div>

    <div id="arena">QUANTUM FIELD</div>
  </div>

</div>

<div id="popup" class="popup hidden">
  <div class="box">
    <h1 id="msg"></h1>
    <button onclick="resetGame()">RESTART</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
