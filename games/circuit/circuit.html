<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Circuit Lab AAA</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>⚛ QUANTUM CIRCUIT LAB AAA</h1>
<p>Select a mission to begin simulation</p>
</header>

<!-- MAIN MENU (ALL MISSIONS) -->
<div id="menu" class="menu">

<h2>🧪 Quantum Missions (10)</h2>
<div id="missionList"></div>

</div>

<!-- GAME VIEW -->
<div id="game" class="game hidden">

<div class="topBar">
<button onclick="backToMenu()">⬅ BACK</button>
<button onclick="quitGame()">⛔ QUIT</button>
<div id="score">Score: 0</div>
</div>

<h2 id="missionTitle">Mission</h2>
<p id="missionText"></p>

<div class="circuitBox">
<div>q0 → <span id="q0">— — —</span></div>
</div>

<div class="controls">
<button onclick="addGate('H')">H</button>
<button onclick="addGate('X')">X</button>
<button onclick="addGate('CX')">CX</button>
<button onclick="resetCircuit()">RESET</button>
</div>

<button id="runBtn">RUN CIRCUIT</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
<div class="box">
<h1 id="title"></h1>
<p id="text"></p>
<button onclick="next()">NEXT</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
