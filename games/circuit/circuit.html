<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Circuit Lab AAA</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>⚛ QUANTUM CIRCUIT LAB AAA</h1>
<p>Select a mission and build the correct quantum circuit</p>
</header>

<!-- MENU -->
<div id="menu" class="menu">
<h2>🧪 Missions (10)</h2>
<div id="missionList"></div>
</div>

<!-- GAME -->
<div id="game" class="game hidden">

<div class="topBar">
<button onclick="backToMenu()">⬅ Back</button>
<button onclick="quitGame()">⛔ Quit</button>
<div id="score">Score: 0</div>
</div>

<h2 id="missionTitle"></h2>
<p id="missionText"></p>

<div class="targetBox">
<h3>🎯 Target Circuit</h3>
<div id="target"></div>
</div>

<div class="circuitBox">
<h3>🧪 Your Circuit</h3>
<div id="q0">— — —</div>
</div>

<div class="controls">
<button onclick="addGate('H')">H</button>
<button onclick="addGate('X')">X</button>
<button onclick="addGate('CX')">CX</button>
<button onclick="resetCircuit()">Reset</button>
</div>

<button id="runBtn">RUN CIRCUIT ⚛</button>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
<div class="box">
<h2 id="title"></h2>
<p id="text"></p>
<button onclick="nextMission()">NEXT</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
